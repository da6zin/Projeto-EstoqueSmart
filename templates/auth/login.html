{% extends 'base.html' %}
{% block title %}Login — EstoqueSmart{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-12 col-md-5 col-lg-4">
        <div class="text-center mb-4">
            <img src="{{ url_for('static', filename='logo.jpg') }}" alt="Logo" class="auth-logo mb-2">
            <h2 class="fw-bold">EstoqueSmart</h2>
            <p class="text-muted">Controle seu estoque com facilidade</p>
        </div>
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h5 class="card-title mb-4">Entrar na conta</h5>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">E-mail</label>
                        <input type="email" name="email" class="form-control form-control-lg"
                               placeholder="seu@email.com" required autofocus>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Senha</label>
                        <input type="password" name="senha" class="form-control form-control-lg"
                               placeholder="••••••" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-100">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
                    </button>
                </form>
            </div>
        </div>
        <p class="text-center mt-3 text-muted">
            Não tem conta? <a href="{{ url_for('auth.cadastro') }}">Cadastre-se grátis</a>
        </p>
    </div>
</div>
{% endblock %}
